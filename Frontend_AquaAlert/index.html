<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquAlert GDL - Monitoreo de Inundaciones</title>
    <!-- Importar CSS de Leaflet (Librería de Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌊 AquAlert GDL</h1>
        <p>Monitoreo en Tiempo Real - Zona Metropolitana de Guadalajara</p>
    </header>

    <main class="contenedor-principal">
        <!-- Contenedor del Mapa interactivo -->
        <section id="mapa" class="seccion-mapa"></section>

        <!-- Contenedor de la Lista de Alertas -->
        <aside class="seccion-alertas">
            <h2>🚨 Alertas Activas</h2>
            <div id="lista-alertas">
                <p>Cargando datos desde los sensores...</p>
            </div>
            <p id="ultima-actualizacion" class="texto-pequeno"></p>
        </aside>
    </main>

    <!-- Importar JS de Leaflet y nuestro script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
