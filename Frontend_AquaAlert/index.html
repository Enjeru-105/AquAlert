<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquAlert GDL</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Encabezado -->
    <header class="app-header">
        <div class="header-content">
            <h1>AquAlert GDL</h1>
            <p>Sistema IoT de Monitoreo de Inundaciones</p>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="app-container">

        <!-- Sección del Mapa -->
        <section class="map-section">
            <iframe
                src="https://www.openstreetmap.org/export/embed.html?bbox=-103.425%2C20.635%2C-103.335%2C20.715&layer=mapnik" 
                style="pointer-events: none; border: none;"
                class="map-iframe"
                title="Mapa de Guadalajara">
            </iframe>
            
            <!-- Contenedor dinámico de marcadores -->
            <div id="map-markers" class="markers-container"></div>
            
            <!-- Tooltip -->
            <div id="tooltip" class="tooltip hidden">
                <p id="tt-name" class="tt-title"></p>
                <p id="tt-level" class="tt-text"></p>
                <p id="tt-status" class="tt-badge"></p>
            </div>
        </section>

        <!-- Panel Lateral (Sidebar) -->
        <aside class="sidebar">
            <h2 class="sidebar-title">
                <i data-lucide="alert-triangle" class="icon-warning"></i>
                Estado de Sensores
            </h2>

            <!-- Lista dinámica de tarjetas -->
            <div id="alerts-list" class="alerts-list">
                <p class="loading-text">Conectando con ThingSpeak...</p>
            </div>

            <!-- Leyenda Inferior -->
            <div class="legend">
                <h3>LEYENDA</h3>
                <div class="legend-item">
                    <div class="legend-dot dot-safe"></div>
                    <span>Seguro (< 30 cm)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot dot-danger"></div>
                    <span>Peligro (> 30 cm)</span>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
