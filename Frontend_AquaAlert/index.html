<!DOCTYPE html>
<html lang="es">
<head>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquAlert GDL</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Encabezado -->
    <header class="app-header">
        <div class="header-content">
            <h1>AquAlert GDL</h1>
            <p>Sistema IoT de Monitoreo de Inundaciones</p>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="app-container">
        <!-- Sección del Mapa -->
        <section class="map-section">
            <div id="mapa-gdl" style="width: 100%; height: 100%; z-index: 1;"></div>

             <div id="tooltip" class="tooltip hidden" style="z-index: 1000;">
                <p id="tt-name" class="tt-title"></p>
                <p id="tt-level" class="tt-text"></p>
                <p id="tt-status" class="tt-badge"></p>
            </div>
        </section>

        <!-- Panel Lateral (Sidebar) -->
        <aside class="sidebar">
            <h2 class="sidebar-title">
                <i data-lucide="alert-triangle" class="icon-warning"></i>
                Estado de Sensores
            </h2>

            <!-- Lista dinámica de tarjetas -->
            <div id="alerts-list" class="alerts-list">
                <p class="loading-text">Conectando con ThingSpeak...</p>
            </div>

            <!-- Leyenda Inferior -->
            <div class="legend">
                <h3>LEYENDA</h3>
                <div class="legend-item">
                    <div class="legend-dot dot-safe"></div>
                    <span>Seguro (< 50 cm)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot dot-danger"></div>
                    <span>Peligro (> 50 cm)</span>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
